<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>言葉の贈り物</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
            background: #f7f2ee;
            display: flex;
            justify-content: center;
        }

        .phone-frame {
            position: relative;
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background-image: url("{% if mode == 'aiemon' %}/static/washi_cream.png{% else %}/static/washi_bg.jpg{% endif %}");
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .ai-image {
            position: absolute;
            top: 20px;
            left: 10px;
            width: 170px;
            height: auto;
        }
        
        .count-text {
            font-size: 12px;
        }
        
        .date-text {
            position: absolute;
            top: 50px;
            left: 200px;
            font-size: 18px;
            color: #222222;
            font-weight: bold;
        }

        .title-text {
            position: absolute;
            top: 90px;
            left: 200px;
            font-size: 28px;
            color: #222222;
            font-weight: bold;
        }
        
        .version-text {
            position: absolute;
            top: 129px;
            left: 200px;
            font-size: 12px;
            color: #222222;
            font-weight: bold;
        }

        #tone-btn {
            position: absolute;
            top: 150px;
            left: 200px;            
            font-size: 12px;
            padding: 2px 6px;
            # border: 2px #f4c6cc;
            border: 1px solid black;
            # border: none;
            # background: #f4c6cc;            
            background: rgba(247, 242, 238, 0.75);
        }
        
        #toneArea {
            position: absolute;
            top: 140px;
            left: 285px;
        }

        #toneArea input {
            width: 100px;
        }
        
        .input-label {
            position: absolute;
            top: 219px;
            left: 30px;
            font-size: 13px;
            font-weight: bold;
            color: #222222;
            border: 1px solid black;
            background: rgba(247, 242, 238, 0.75);
            padding: 2px 6px;
        }

        #enjoy-btn {
            position: absolute;
            top: 219px;
            left: 200px;
            font-size: 13px;
            # font-weight: bold;
            padding: 2px 6px;
            border: 1px solid black;
            background: rgba(247, 242, 238, 0.75);
        }
        
        .enter-button {
            position: absolute;
            top: 215px;
            left: 330px;
            width: 70px;
            height: 28px;
            border: none;
            background: #f4c6cc;
            color: #222222;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }

        .input-box {
            position: absolute;
            top: 245px;
            left: 30px;
            width: 380px;
            height: 60px;
            font-size: 14px;
            border: 1px solid #999;
            box-sizing: border-box;
            padding: 8px;
            resize: none;
            background: rgba(255, 255, 255, 0.85);
            font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
        }

        .reply-box {
            position: absolute;
            top: 315px;
            left: 30px;
            width: 380px;
            min-height: 0;
            box-sizing: border-box;
            border: 1px solid #999;
            background: rgba(255, 255, 255, 0.85);
            padding: 12px;
            font-size: 16px;
            color: #222222;
            white-space: pre-wrap;
            line-height: 1.8;
        }
        .today-mode {
            font-size: 22px;
            font-weight: bold;
        }
        @media (max-width: 480px) {
            .phone-frame {
                max-width: 100vw;
            }

            .input-box,
            .reply-box {
                width: calc(100% - 60px);
            }

            .enter-button {
                left: auto;
                right: 20px;
            }
        }
    </style>
</head>
<body style="background-color: {% if mode == 'aiemon' %}#e6f7ff{% else %}#fffbe6{% endif %};">
    <div class="phone-frame">
        <img src="/static/aiueo.png" alt="aiueo" class="ai-image">
        
        <div class="count-text">ハッピー {{ count }} </div>
        <div class="date-text">{{ date_text }}</div>
        <div class="title-text">{{ "あい右衛門と" if mode == "aiemon" else "言葉の贈り物" }}</div>

        <button type="button" id="tone-btn" onclick="toggleMode()">モード切替</button>
        <button type="button" id="enjoy-btn">お楽しみ言葉</button>
        
        <form id="mainForm" method="POST" onsubmit="document.getElementById('toggleModeInput').value=''; document.getElementById('replyBox').innerText='返答を待っています...';">
            <div id="toneArea" style="display:{{ 'block' if tone else 'none' }}; margin-top:8px;">
                <input type="text" name="tone" value="{{ tone }}" placeholder="味付け">
            </div>
            <button type="button" id="word-btn" class="input-label">あなたの言葉</button>
            <div class="version-text">バージョン β-09.1</div>
            <button type="button" class="enter-button" onclick="document.getElementById('replyBox').innerText='返答を待っています...'; document.getElementById('mainForm').submit();">ENTER</button>
            <textarea name="user_text" class="input-box">{{ user_text or 'こんにちは' }}</textarea>
        </form>

<div id="replyBox" class="reply-box {% if not reply %}today-mode{% endif %}">{% if reply %}<strong>{{ reply }}</strong>{% else %}{{ today_word }}{% endif %}</div>            
    </div>
<script>
document.getElementById("word-btn").addEventListener("click", function() {
    var box = document.querySelector(".input-box");
    box.value = "";
    box.placeholder = "ここに一言どうぞ";
    box.focus();
    box.scrollIntoView({ behavior: "smooth", block: "center" });
    box.style.border = "2px solid #ff8888";
    setTimeout(function(){ box.style.border = ""; }, 1500);
    setTimeout(function(){ box.placeholder = ""; }, 1500);
    var btn = document.getElementById("word-btn");
    btn.textContent = "入力してください";
    setTimeout(function(){ btn.textContent = "あなたの言葉"; }, 1500);
});    

document.getElementById("enjoy-btn").addEventListener("click", function() {
    var words = {{ enjoy_words|tojson }};
    var box = document.querySelector(".input-box");
    var random = words[Math.floor(Math.random() * words.length)];

    box.value = random;
    box.focus();
});
    
</script>
    <script>
    function showTone() {
        document.getElementById("toneArea").style.display = "block";
    }
    function toggleMode() {
        fetch('/toggle_mode', { method: 'POST' })
        .then(response => {
            if (response.ok) {
                location.reload();
            }
        });
    }
</script>

<script>
function updateTitle(mode) {
    const title = document.getElementById("title-text");
    if (mode === "aiuemon") {
        title.textContent = "あい右衛門と";
    } else {
        title.textContent = "言葉の贈り物";
    }
}
</script>

</body>
</html>
